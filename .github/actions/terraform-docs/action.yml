author: D. Ashmore
name: Terraform Docs Update
description: Checks that documentation has been updated on PR
inputs:
  push:
    description: 'Pushes generated documentation changes'
    default: false
  config:
    description: Terraform Docs config file
    default: .terraform-docs.yml
runs:
  using: composite
  steps:
    - name: setup go
      uses: actions/setup-go@v4
      with:
        go-version: "1.21.x"
        # cache-dependency-path: tests/go.sum

    - name: install tools
      shell: bash
      run: |
        go install github.com/terraform-docs/terraform-docs@v0.17.0

    - name: Terraform documentation generation
      shell: bash
      env:
        CONFIG-INPUT: ${{ inputs.config }}
      run: |
        echo "==> Generating Terraform documentation..."
        set -x
        if [ -f $CONFIG-INPUT ]; then
          export DOCS-CONFIG=$(realpath $CONFIG-INPUT)
        else
          export DOCS-CONFIG=$(echo $CONFIG-INPUT)
        fi
        find . -name '*.tf' | while read f; do dirname $f; done | sort -u | while read d; do terraform-docs -c $DOCS-CONFIG $d; done

    - name: check for changes
      if: ${{false == inputs.push}}
      shell: bash
      run: |
        echo "==> Testing for changes to tracked files"
        CHANGES=$(git status -suno)
        if [ "$CHANGES" ]; then
          echo "Repository Terraform documentation is not correct."
          echo
          git diff
          exit 1
        fi